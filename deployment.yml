apiVersion: apps/v1
kind: Deployment
metadata: 
    name: demoApp-deployment
    namespace: demo-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
       app: demo-app
  template:
     metadata:
        labels: 
            app: demo-app
     spec:
       containers:
         - name: demo-app-container
           image: skuma011/demo-app:1.0.2
           imagePullPolicy: IfNotPresent
           ports:
            - containerPort: 8082

---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-service
spec:
  type: LoadBalancer  
  selector:
     app: demoapp-deployment
  ports:
   - protocol: "TCP"
     port: 8082
     targetPort: 8082
